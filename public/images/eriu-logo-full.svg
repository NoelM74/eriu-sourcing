<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="100%" height="100%">
  <defs>
    <style>
      .brand-eriu {
        font-family: 'Inter', 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 68px;
        font-weight: 800;
        fill: #1A533E; /* Ériu Deep Emerald */
        letter-spacing: 1.5px;
      }
      .brand-sourcing {
        font-family: 'Inter', 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 68px;
        font-weight: 500;
        fill: #0F2131; /* Midnight Navy */
        letter-spacing: -0.5px;
      }
    </style>
  </defs>

  <g transform="translate(20, 85)">
    <text x="0" y="0" class="brand-eriu">ÉRIU</text>
    
    <text x="195" y="0" class="brand-sourcing">Sourcing</text>
  </g>
</svg>
